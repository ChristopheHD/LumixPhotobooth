<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Lumix Capture</title>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="viewport">
        <canvas id="canvas" width="800" height="600"></canvas>
        <div id="countdown" class="overlay hidden" aria-live="assertive"></div>
        <div id="flash" class="overlay hidden"></div>
      </div>
      <br>
      <button id="captureButton" class="capture" aria-label="Take photo">Capture</button>
      <p class="shortcut-hint">Press <strong>Space</strong> to take photo</p>
    </div>

    <script src="js/index.js"></script>
  </body>
</html>
