<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Lumix Capture</title>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
  </head>
  <body>
    <div id="wifi-screen" class="wifi-container">
      <h1>Connecter l'appareil photo</h1>
      <p id="wifi-error" class="hidden error-text"></p>
      <ul id="wifi-list" class="wifi-list">
        <li>Recherche des réseaux...</li>
      </ul>
    </div>

    <div id="app-container" class="container hidden">
      <div class="viewport">
        <img id="preview" />
        <div id="countdown" class="overlay hidden" aria-live="assertive"></div>
        <div id="flash" class="overlay hidden"></div>
      </div>
      <br>
      <button id="captureButton" class="capture" aria-label="Take photo">Capture</button>
      <p class="shortcut-hint">Press <strong id="spaceKey" class="kbd-key">Space</strong> to take photo</p>
    </div>

    <script src="js/index.js"></script>
  </body>
</html>
