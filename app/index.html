<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Lumix Capture</title>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
  </head>
  <body>
    <div id="wifi-screen" class="wifi-container">
      <h1>Connect Camera</h1>
      <p id="wifi-error" class="hidden error-text"></p>
      <ul id="wifi-list" class="wifi-list" aria-live="polite">
        <li>Searching for networks...</li>
      </ul>
    </div>

    <div id="app-container" class="container hidden">
      <div class="viewport">
        <img id="preview" alt="Live camera preview" />
        <div id="countdown" class="overlay hidden" aria-live="assertive"></div>
        <div id="flash" class="overlay hidden"></div>
      </div>
      <br>
      <button id="captureButton" class="capture" aria-label="Take photo" aria-keyshortcuts="Space">Capture</button>
      <p class="shortcut-hint">Press <kbd id="spaceKey" class="kbd-key">Space</kbd> to take photo</p>
    </div>

    <div id="reviewScreen" class="overlay-screen hidden">
      <img id="reviewImage" alt="Captured photo" />
      <div id="reviewControls" class="review-controls">
        <div class="review-btn-group">
          <button id="printButton" class="review-btn print-btn">Print</button>
          <p class="shortcut-hint">Press <kbd id="enterKey" class="kbd-key">Enter</kbd> to print</p>
        </div>
        <div class="review-btn-group">
          <button id="newPhotoButton" class="review-btn new-photo-btn">New Photo</button>
          <p class="shortcut-hint">Press <kbd id="reviewSpaceKey" class="kbd-key">Space</kbd> for new photo</p>
        </div>
      </div>
      <div id="reviewStatus" class="review-status hidden">Printing...</div>
    </div>

    <script src="js/index.js"></script>
  </body>
</html>
